<main class="grow container">
  <div class="flex flex-col grow gap-4 pt-20 pb-10">
    <section>
      <h1 class="text-2xl font-extrabold">
        Welcome Back, {{ customer()?.first_name | titlecase }}
      </h1>
      This is your customer dashboard page. You'll be able to check your
      balances and manage your account with us.
    </section>
    <section class="card">
      <app-money-transfer-form
        [customerId]="customer()?.id ?? 0"
      ></app-money-transfer-form>
    </section>
    <div class="flex gap-4 flex-wrap">
      <div class="grow max-w-full">
        <section class="flex flex-col gap-4 card">
          <h1 class="text-xl font-extrabold">Account Value Over Time</h1>
          <app-account-insights></app-account-insights>
        </section>
      </div>
      <section class="flex flex-col gap-4 card grow w-1/2">
        <h1 class="text-xl font-extrabold">Recent Transactions</h1>
        <app-recent-transactions></app-recent-transactions>
      </section>
    </div>
  </div>
</main>
<app-footer></app-footer>
