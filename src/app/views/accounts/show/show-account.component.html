<section class="flex flex-col gap-4">
  <h1 class="text-xl font-extrabold">
    {{ account?.name }}
  </h1>
  <div
    class="text-sm inline-flex w-fit items-center gap-1 rounded-lg bg-green-100 py-2 px-3"
  >
    <div>
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-4 h-4"
        viewBox="0 0 24 24"
      >
        <path
          fill="currentColor"
          d="M18 4H6C3.79 4 2 5.79 2 8v8c0 2.21 1.79 4 4 4h12c2.21 0 4-1.79 4-4V8c0-2.21-1.79-4-4-4m-1.86 9.77c-.24.2-.57.28-.88.2L4.15 11.25C4.45 10.52 5.16 10 6 10h12c.67 0 1.26.34 1.63.84zM6 6h12c1.1 0 2 .9 2 2v.55c-.59-.34-1.27-.55-2-.55H6c-.73 0-1.41.21-2 .55V8c0-1.1.9-2 2-2"
        />
      </svg>
    </div>
    <div class="font-bold">Balance:</div>
    {{ account?.balance | currency }}
  </div>
  <section class="flex flex-col gap-4">
    <h2 class="text-lg font-extrabold">Insights</h2>
    <app-banner [fullWidth]="true" severity="info" exclamation="🧠">
      Coming soon!
    </app-banner>
  </section>
  <section class="flex flex-col gap-4">
    <h2 class="text-lg font-extrabold">Pending Transactions</h2>
    <app-banner [fullWidth]="true" severity="warning" exclamation="⏳">
      Coming soon!
    </app-banner>
  </section>
  <section class="flex flex-col gap-4">
    <h2 class="text-lg font-extrabold">Recent Transactions</h2>
    <app-banner [fullWidth]="true" severity="info" exclamation="🧾">
      Coming soon!
    </app-banner>
  </section>
</section>
