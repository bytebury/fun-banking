<app-navbar></app-navbar>
<main>
  <aside class="drawer">
    <ng-content select="dashboard-drawer"></ng-content>
  </aside>
  <div class="wrapper">
    <section>
      <ng-content select="dashboard-content"></ng-content>
    </section>
    <aside class="updates">
      <app-card>
        <div class="flex flex-col gap-2">
          <h1 class="font-semibold">Latest News</h1>
          <app-timeline>
            <a
              ngProjectAs="view-more"
              class="text-xs text-gray-500 no-underline hover:text-primary-link hover:underline"
              [routerLink]="['/announcements']"
            >
              View announcements &rarr;
            </a>
          </app-timeline>
        </div>
      </app-card>
    </aside>
  </div>
</main>
